<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/78f6e8ae05.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="../Site-favicon.ico" type="image/x-icon">
    <title>Register - Minecraft Wiki</title>
    <link rel="stylesheet" href="../assets/css/register.css">
</head>
<body>
    <div class="out-wrapper">
        <a href="../index.html">back</a>
        <section class="wrapper">
            <header>
                <h1>Join FANDOM Today</h1>
                <p>Already have an account? <a href="">Sign in</a></p>
            </header>
            <div class="flex-container">
                <div class="social">
                    <h2>Connect a Social Account</h2>
                    <ul>
                        <li class="btn fb"><img src="../assets/icons/facebook.svg" alt="facebook"><a href="">connect with facebook</a></li>
                        <li class="btn google"><img src="../assets/icons/google.svg" alt="google"><a href="">connect with google</a></li>
                        <li class="btn twitch"><img src="../assets/icons/twitch.svg" alt="twitch"><a href="">connect with twitch</a></li>
                        <li class="btn apple"><img src="../assets/icons/apple.svg" alt="apple"><a href="">connect with apple</a></li>
                    </ul>
                </div>
                <form class="register">
                    <h2>Register with Email</h2>
                    <label for="">
                        <input name="email" type="email" placeholder="Email" required>
                    </label>
                    <label>
                        <input name="username" type="text" placeholder="Username" required>
                    </label>
                    <label>
                        <input name="password" type="password" placeholder="Password" required>
                    </label>
                    <label>
                        <input name="date" type="date">
                    </label>
                    <label>
                        <input name="subscribe" type="checkbox" checked value="subscribe">
                        <span>Email me about FANDOM news and events</span>
                    </label>
                    <label>
                        <input name="agree" type="checkbox" required>
                        <span>I agree to:</span>
                    </label>
                    <ul>
                        <li><a href="https://www.fandom.com/terms-of-use" target="_blank">FANDOM's terms of use</a></li>
                        <li><a href="https://www.fandom.com/privacy-policy" target="_blank">Privacy Policy</a></li>
                    </ul>
                    <label>
                        <input type="submit" value="REGISTER">
                    </label>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
